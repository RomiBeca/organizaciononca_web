<!-- MODAL: detalle del día del calendario -->
<div class="modal fade" id="diaModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header border-warning">
        <h5 class="modal-title fw-bold" id="diaModal-titulo"></h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
      </div>
      <div class="modal-body">
        
        <!-- Lugar -->
        <div class="mb-3" id="diaModal-lugar">
          <span class="text-warning fw-bold">📍 Lugar:</span><br>
          <span></span>
        </div>

        <!-- Horario (para eventos especiales) -->
        <div class="mb-3" id="diaModal-horario">
          <span class="text-warning fw-bold">📝 Detalles:</span><br>
          <span></span>
        </div>

        <!-- Días -->
        <div class="mb-3" id="diaModal-dias">
          <span class="text-warning fw-bold">📅 Días:</span><br>
          <span></span>
        </div>
        
        <!-- Horarios (múltiples) -->
        <div class="mb-3" id="diaModal-horarios">
          <span class="text-warning fw-bold">⏰ Horarios:</span>
          <ul class="list-unstyled ms-3 mt-2"></ul>
        </div>
        
        <!-- Precios (múltiples) -->
        <div class="mb-0" id="diaModal-precios">
          <span class="text-warning fw-bold">💰 Precios:</span>
          <ul class="list-unstyled ms-3 mt-2"></ul>
        </div>

      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-warning fw-bold" data-bs-dismiss="modal">Cerrar</button>
      </div>
    </div>
  </div>
</div>
