    <script>
      (function () {
        const panel = document.getElementById('share-panel');
        let _shareUrl = '';

        function _copyLabel(l) {
          if (l === 'pt') return 'Copiar link';
          if (l === 'en') return 'Copy link';
          return 'Copiar enlace';
        }

        function _closeLabel(l) {
          if (l === 'pt') return 'Fechar';
          if (l === 'en') return 'Close';
          return 'Cerrar';
        }

        window.openSharePanel = function (titulo, url) {
          const l = window.uiLang ? window.uiLang() : 'es';
          _shareUrl = url;
          const text = `📍 ${titulo}\n\n🥁 Organização Onça Chile\n${url}`;
          document.getElementById('share-opt-whatsapp').href =
            'https://wa.me/?text=' + encodeURIComponent(text);
          document.getElementById('share-opt-gmail').href =
            'https://mail.google.com/mail/?view=cm&su=' +
            encodeURIComponent('Organização Onça Chile – ' + titulo) +
            '&body=' + encodeURIComponent(text);
          document.getElementById('share-copy-label').textContent = _copyLabel(l);
          document.getElementById('share-opt-close').textContent = _closeLabel(l);
          panel.classList.remove('d-none');
          document.body.style.overflow = 'hidden';
        };

        function closeSharePanel() {
          panel.classList.add('d-none');
          document.body.style.overflow = '';
        }

        panel.querySelector('.share-panel-backdrop').addEventListener('click', closeSharePanel);
        document.getElementById('share-opt-close').addEventListener('click', closeSharePanel);

        document.getElementById('share-opt-instagram').addEventListener('click', () => {
          navigator.clipboard.writeText(_shareUrl).catch(() => {});
          window.open('https://instagram.com/organizacaooncaschile', '_blank');
          closeSharePanel();
        });

        document.getElementById('share-opt-copy').addEventListener('click', async () => {
          const l = window.uiLang ? window.uiLang() : 'es';
          const label = document.getElementById('share-copy-label');
          try {
            await navigator.clipboard.writeText(_shareUrl);
            label.textContent = l === 'pt' ? '✓ Copiado!' : l === 'en' ? '✓ Copied!' : '✓ ¡Copiado!';
            setTimeout(() => { label.textContent = _copyLabel(l); }, 2000);
          } catch { label.textContent = '✗ Error'; }
        });
      })();
    </script>

    <script>
      (async () => {
        const container = document.getElementById('noticias-page-container');
        const lang = localStorage.getItem('onca-lang') || 'es';

        try {
          const res = await fetch('../data/noticias.json');
          if (!res.ok) throw new Error();
          const noticias = await res.json();

          if (!noticias.length) {
            container.innerHTML = `<p class="text-center text-body-secondary py-5">${window.uiT('noticias.vacia')}</p>`;
            return;
          }

          // Agrupar por mes (usando campo localizado)
          const porMes = {};
          noticias.forEach(n => {
            const mes = n['mes_' + lang] || n.mes;
            if (!porMes[mes]) porMes[mes] = [];
            porMes[mes].push(n);
          });

          const verAfiche = window.uiT('noticias.ver');
          const destacadoLabel = lang === 'pt' ? 'Destaque' : 'Destacado';

          container.innerHTML = Object.entries(porMes).map(([mes, items]) => `
            <div class="mb-5">
              <h3 class="mes-titulo">${mes}</h3>
              <div class="row g-4">
                ${items.map(n => `
                  <div class="col-md-6" id="noticia-${n.id}">
                    <div class="noticia-full-card${n.destacado ? ' noticia-destacada' : ''}">
                      ${n.imagen
                        ? `<div class="noticia-img-wrapper" data-bs-toggle="modal" data-bs-target="#modal-afiche" data-src="../${n.imagen}" data-alt="${n['titulo_' + lang] || n.titulo}">
                             <img src="../${n.imagen}" alt="${n['titulo_' + lang] || n.titulo}" class="noticia-full-img" loading="lazy">
                             <div class="noticia-img-overlay"><span>${verAfiche}</span></div>
                           </div>`
                        : `<div class="noticia-img-placeholder"></div>`
                      }
                      <div class="noticia-full-body">
                        ${n.destacado ? `<span class="badge-destacado">${destacadoLabel}</span>` : ''}
                        <div class="noticia-fecha">${n['fecha_' + lang] || n.fecha}</div>
                        <h4 class="noticia-titulo">${n['titulo_' + lang] || n.titulo}</h4>
                        <p class="noticia-desc">${n['descripcion_' + lang] || n.descripcion}</p>
                        <div class="d-flex justify-content-end mt-2">
                          <button class="btn btn-sm btn-outline-warning btn-compartir-card" data-titulo="${n['titulo_' + lang] || n.titulo}" data-id="${n.id}">
                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"></path><polyline points="16 6 12 2 8 6"></polyline><line x1="12" y1="2" x2="12" y2="15"></line></svg>
                            ${lang === 'pt' ? 'Compartilhar' : 'Compartir'}
                          </button>
                        </div>
                      </div>
                    </div>
                  </div>
                `).join('')}
              </div>
            </div>
          `).join('');

          // Modal afiche
          const modalAfiche = document.getElementById('modal-afiche');
          const btnShare = document.getElementById('btn-share-afiche');

          modalAfiche.addEventListener('show.bs.modal', e => {
            const trigger = e.relatedTarget;
            document.getElementById('modal-afiche-img').src = trigger.dataset.src;
            document.getElementById('modal-afiche-img').alt = trigger.dataset.alt;
            document.getElementById('modal-afiche-titulo').textContent = trigger.dataset.alt;
            
            // Guardar datos para compartir
            modalAfiche.dataset.imageSrc = trigger.dataset.src;
            modalAfiche.dataset.imageAlt = trigger.dataset.alt;
          });

          // Botón de compartir del modal
          btnShare.addEventListener('click', () => {
            const titulo = document.getElementById('modal-afiche-titulo').textContent;
            bootstrap.Modal.getInstance(modalAfiche).hide();
            openSharePanel(titulo, 'https://organizacaooncachile.cl');
          });

          // Compartir desde card
          container.addEventListener('click', e => {
            const btn = e.target.closest('.btn-compartir-card');
            if (!btn) return;
            const titulo = btn.dataset.titulo;
            const id = btn.dataset.id;
            const url = `https://organizacaooncachile.cl/frontend/assets/page/noticias.html#noticia-${id}`;
            openSharePanel(titulo, url);
          });

          // Ir al anchor si viene desde home (#noticia-X)
          if (location.hash) {
            setTimeout(() => {
              const el = document.querySelector(location.hash);
              if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }, 100);
          }

        } catch {
          container.innerHTML = `<p class="text-center text-body-secondary py-5">${window.uiT('noticias.error')}<br><small>${window.uiT('noticias.error.sub')}</small></p>`;
        }
      })();
    </script>
